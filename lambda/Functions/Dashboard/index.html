<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>William Phase 2 - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Phase 2 Command Center</h1>
            <div class="space-x-4">
                <button onclick="refreshAll()" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700">Refresh All</button>
                <button onclick="exportCSV()" class="bg-green-600 text-white px-4 py-2 rounded shadow hover:bg-green-700">Export Orders</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-xl font-bold text-gray-700 mb-1">PokeAPI Live Lookup</h2>
            <p class="text-sm text-gray-500 mb-4">
                <span class="inline-block bg-purple-100 text-purple-700 px-2 py-0.5 rounded text-xs font-semibold mr-2">Direct</span> calls Lambda directly.
                <span class="inline-block bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded text-xs font-semibold mr-2">Secure (Step Function)</span> calls via Step Function with 5x retry on server failure.
            </p>
            <div class="flex gap-4">
                <input id="poke-input" type="text" placeholder="Enter Pokemon Name..." class="border p-2 rounded-lg flex-grow">
                <button onclick="searchPokemon('direct')" class="bg-purple-600 text-white px-6 py-2 rounded-lg shadow hover:bg-purple-700">
                    Direct Search
                </button>
                <button onclick="searchPokemon('secure')" class="bg-yellow-500 text-white px-6 py-2 rounded-lg shadow hover:bg-yellow-600">
                    🔁 Secure Search
                </button>
            </div>

            <!-- Result display -->
            <div id="poke-result" class="mt-4 p-4 border rounded-lg bg-purple-50 hidden"></div>

            <!-- Mode indicator -->
            <div id="poke-mode" class="mt-2 text-xs text-gray-400 hidden"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white shadow-md rounded-lg overflow-hidden">
                <div class="bg-gray-100 px-5 py-3 border-b">
                    <h2 class="font-bold text-gray-700 uppercase">Product Inventory (inc. Scheduled Poke-Imports)</h2>
                </div>
                <table class="min-w-full leading-normal">
                    <thead>
                        <tr>
                            <th class="px-5 py-3 border-b-2 border-gray-200 text-left text-xs font-semibold text-gray-600 uppercase">Image</th>
                            <th class="px-5 py-3 border-b-2 border-gray-200 text-left text-xs font-semibold text-gray-600 uppercase">Product</th>
                            <th class="px-5 py-3 border-b-2 border-gray-200 text-left text-xs font-semibold text-gray-600 uppercase">Price</th>
                        </tr>
                    </thead>
                    <tbody id="product-body"></tbody>
                </table>
            </div>

            <div class="bg-white shadow-md rounded-lg overflow-hidden">
                <div class="bg-gray-100 px-5 py-3 border-b">
                    <h2 class="font-bold text-gray-700 uppercase">Recent Orders</h2>
                </div>
                <table class="min-w-full leading-normal">
                    <thead>
                        <tr>
                            <th class="px-5 py-3 border-b-2 border-gray-200 text-left text-xs font-semibold text-gray-600 uppercase">Order ID</th>
                            <th class="px-5 py-3 border-b-2 border-gray-200 text-left text-xs font-semibold text-gray-600 uppercase">Status</th>
                            <th class="px-5 py-3 border-b-2 border-gray-200 text-left text-xs font-semibold text-gray-600 uppercase">Total</th>
                        </tr>
                    </thead>
                    <tbody id="order-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.href.split('/dashboard')[0];

        async function fetchProducts() {
            const res = await fetch(`${API_BASE}/products`);
            const result = await res.json();
            const products = result.data || [];
            const body = document.getElementById('product-body');
            body.innerHTML = products.map(p => `
                <tr>
                    <td class="px-5 py-4 border-b border-gray-200 text-sm">
                        <img src="${p.imageUrl || 'https://via.placeholder.com/50'}" class="w-10 h-10 rounded-full">
                    </td>
                    <td class="px-5 py-4 border-b border-gray-200 text-sm font-bold capitalize">${p.name}</td>
                    <td class="px-5 py-4 border-b border-gray-200 text-sm text-green-600 font-bold">$${p.price}</td>
                </tr>
            `).join('');
        }

        async function fetchOrders() {
            const res = await fetch(`${API_BASE}/orders`);
            const result = await res.json();
            const orders = result.data || [];
            const body = document.getElementById('order-body');
            body.innerHTML = orders.map(o => `
                <tr>
                    <td class="px-5 py-4 border-b border-gray-200 text-sm text-gray-500">${o.orderId.substring(0,8)}...</td>
                    <td class="px-5 py-4 border-b border-gray-200 text-sm">
                        <span class="px-2 py-1 rounded text-xs font-bold ${o.status === 'COMPLETED' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">${o.status}</span>
                    </td>
                    <td class="px-5 py-4 border-b border-gray-200 text-sm font-bold">$${o.totalPrice}</td>
                </tr>
            `).join('');
        }

        async function searchPokemon(mode = 'direct') {
            const name = document.getElementById('poke-input').value.trim().toLowerCase() || 'pikachu';
            const display = document.getElementById('poke-result');
            const modeEl = document.getElementById('poke-mode');

            display.classList.remove('hidden');
            modeEl.classList.remove('hidden');
            display.innerHTML = `<span class="animate-pulse">Searching for <strong>${name}</strong>...</span>`;

            try {
                let res, result;

                if (mode === 'direct') {
                    // Direct Lambda call
                    modeEl.innerHTML = '🟣 Mode: <strong>Direct Lambda</strong> — no retry mechanism';
                    res = await fetch(`${API_BASE}/pokemon?name=${name}`);
                    result = await res.json();
                    renderPokemon(result.data, display, 'purple');
                } else {
                    // Step Function call with retry
                    modeEl.innerHTML = '🟡 Mode: <strong>Step Function (Secure)</strong> — retries up to 5x on server failure';
                    res = await fetch(`${API_BASE}/pokemon-secure`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name })
                    });
                    const raw = await res.json();
                    // Response comes nested from Step Function output
                    const data = raw.data || (typeof raw === 'string' ? JSON.parse(raw).data : raw);
                    renderPokemon(data, display, 'yellow');
                }
            } catch (err) {
                display.innerHTML = `<span class="text-red-500">Error: ${err.message}</span>`;
            }
        }

        function renderPokemon(p, display, color) {
            if (!p) {
                display.innerHTML = '<span class="text-red-500">Pokemon not found or server error.</span>';
                return;
            }
            const bg = color === 'yellow' ? 'bg-yellow-50 border-yellow-200' : 'bg-purple-50 border-purple-200';
            display.className = `mt-4 p-4 border rounded-lg ${bg}`;
            display.innerHTML = `
                <div class="flex items-center gap-4">
                    <img src="${p.sprite}" class="w-20 h-20">
                    <div>
                        <h3 class="text-xl font-bold capitalize">${p.name} <span class="text-gray-400">#${p.id}</span></h3>
                        <p class="text-sm text-gray-500">Types: <strong>${p.types?.join(', ')}</strong></p>
                        <p class="text-sm text-gray-500">Height: ${p.height} | Weight: ${p.weight}</p>
                    </div>
                </div>
            `;
        }

        function refreshAll() {
            fetchProducts();
            fetchOrders();
        }

        async function exportCSV() {
            const res = await fetch(`${API_BASE}/orders/export`);
            const result = await res.json();
            if (result.data?.downloadUrl) window.open(result.data.downloadUrl, '_blank');
        }

        refreshAll();
    </script>
</body>
</html>

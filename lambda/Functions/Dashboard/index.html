<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>William Phase 2 - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <div id="login-modal" class="fixed inset-0 bg-gray-900 bg-opacity-90 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-2xl w-96">
            <h2 class="text-2xl font-bold mb-2">Secure Login</h2>
            <p class="text-sm text-gray-500 mb-6">Enter your Cognito credentials</p>
            <input id="login-email" type="email" placeholder="Email" class="w-full border p-2 rounded mb-3">
            <input id="login-password" type="password" placeholder="Password" class="w-full border p-2 rounded mb-4">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 font-bold">Sign In</button>
            <p id="login-error" class="text-red-500 text-sm mt-3 hidden"></p>
        </div>
    </div>

    <div id="dashboard-content" class="max-w-6xl mx-auto opacity-0 transition-opacity duration-500">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Phase 2 Command Center</h1>
            <div class="space-x-4">
                <button onclick="logout()" class="text-gray-500 text-sm underline">Logout</button>
                <button onclick="refreshAll()" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700">Refresh All</button>
                <button onclick="exportCSV()" class="bg-green-600 text-white px-4 py-2 rounded shadow hover:bg-green-700">Export Orders</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-xl font-bold text-gray-700 mb-1">PokeAPI Live Lookup</h2>
            <div class="flex gap-4 mt-4">
                <input id="poke-input" type="text" placeholder="Enter Pokemon Name..." class="border p-2 rounded-lg flex-grow">
                <button onclick="searchPokemon('direct')" class="bg-purple-600 text-white px-6 py-2 rounded-lg shadow hover:bg-purple-700">Direct Search</button>
                <button onclick="searchPokemon('secure')" class="bg-yellow-500 text-white px-6 py-2 rounded-lg shadow hover:bg-yellow-600">🔁 Secure Search</button>
            </div>
            <div id="poke-result" class="mt-4 p-4 border rounded-lg bg-purple-50 hidden"></div>
            <div id="poke-mode" class="mt-2 text-xs text-gray-400 hidden"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white shadow-md rounded-lg overflow-hidden">
                <div class="bg-gray-100 px-5 py-3 border-b"><h2 class="font-bold text-gray-700 uppercase">Product Inventory</h2></div>
                <table class="min-w-full leading-normal"><tbody id="product-body"></tbody></table>
            </div>
            <div class="bg-white shadow-md rounded-lg overflow-hidden">
                <div class="bg-gray-100 px-5 py-3 border-b"><h2 class="font-bold text-gray-700 uppercase">Recent Orders</h2></div>
                <table class="min-w-full leading-normal"><tbody id="order-body"></tbody></table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.href.split('/dashboard')[0];
        const CLIENT_ID = '71gvv4tb0i7vcr0glu79fsra1v';
        let ID_TOKEN = localStorage.getItem('id_token');

        // --- AUTH LOGIC ---
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');

            try {
                const res = await fetch('https://cognito-idp.ap-southeast-1.amazonaws.com/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-amz-json-1.1',
                        'X-Amz-Target': 'AWSCognitoIdentityProviderService.InitiateAuth'
                    },
                    body: JSON.stringify({
                        ClientId: CLIENT_ID,
                        AuthFlow: "USER_PASSWORD_AUTH",
                        AuthParameters: { USERNAME: email, PASSWORD: password }
                    })
                });

                const data = await res.json();
                if (data.AuthenticationResult) {
                    ID_TOKEN = data.AuthenticationResult.IdToken;
                    localStorage.setItem('id_token', ID_TOKEN);
                    showDashboard();
                } else {
                    throw new Error(data.message || "Login Failed");
                }
            } catch (err) {
                errorEl.innerText = err.message;
                errorEl.classList.remove('hidden');
            }
        }

        function showDashboard() {
            document.getElementById('login-modal').classList.add('hidden');
            const content = document.getElementById('dashboard-content');
            content.classList.remove('opacity-0');
            content.classList.add('opacity-100');
            refreshAll();
        }

        function logout() {
            localStorage.clear();
            window.location.reload();
        }

        // --- AUTHORIZED FETCH WRAPPER ---
        async function authFetch(url, options = {}) {
            const headers = { ...options.headers, 'Authorization': ID_TOKEN };
            const res = await fetch(url, { ...options, headers });
            if (res.status === 401) logout();
            return res;
        }

        // --- UPDATED FETCHERS ---
        async function fetchProducts() {
            const res = await fetch(`${API_BASE}/products`); // Public
            const result = await res.json();
            document.getElementById('product-body').innerHTML = (result.data || []).map(p => `
                <tr><td class="px-5 py-4 border-b capitalize font-bold">${p.name}</td><td class="px-5 py-4 border-b text-green-600 font-bold">$${p.price}</td></tr>
            `).join('');
        }

        async function fetchOrders() {
            const res = await authFetch(`${API_BASE}/orders`); // PRIVATE
            const result = await res.json();
            document.getElementById('order-body').innerHTML = (result.data || []).map(o => `
                <tr><td class="px-5 py-4 border-b text-gray-500">${o.orderId.substring(0,8)}...</td><td class="px-5 py-4 border-b font-bold">$${o.totalPrice}</td></tr>
            `).join('');
        }

        async function searchPokemon(mode = 'direct') {
            const name = document.getElementById('poke-input').value.trim().toLowerCase() || 'pikachu';
            const display = document.getElementById('poke-result');
            display.classList.remove('hidden');
            display.innerHTML = "Searching...";

            try {
                let res;
                if (mode === 'direct') {
                    res = await fetch(`${API_BASE}/pokemon?name=${name}`);
                } else {
                    res = await authFetch(`${API_BASE}/pokemon-secure`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name })
                    });
                }
                const result = await res.json();
                const data = mode === 'direct' ? result.data : (typeof result === 'string' ? JSON.parse(result).data : result.data);
                display.innerHTML = `<strong>${data.name}</strong> <img src="${data.sprite}" class="inline w-12">`;
            } catch (err) { display.innerHTML = "Error!"; }
        }

        function refreshAll() { fetchProducts(); fetchOrders(); }

        // AUTO-LOGIN CHECK
        if (ID_TOKEN) {
            showDashboard();
        }
    </script>
</body>
</html>

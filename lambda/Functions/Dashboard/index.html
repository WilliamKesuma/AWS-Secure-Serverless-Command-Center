<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>William Phase 2 - Order Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Order Management</h1>
            <div class="space-x-4">
                <button onclick="fetchOrders()" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700 transition">Refresh List</button>
                <button onclick="exportCSV()" class="bg-green-600 text-white px-4 py-2 rounded shadow hover:bg-green-700 transition">Export CSV</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-xl font-bold text-gray-700 mb-4">Pokemon Lookup (3rd Party API)</h2>
            <div class="flex gap-4">
                <input id="poke-input" type="text" placeholder="Enter Pokemon Name (e.g. pikachu)" 
                       class="border border-gray-300 p-2 rounded-lg flex-grow focus:outline-none focus:ring-2 focus:ring-purple-500">
                <button onclick="searchPokemon()" 
                        class="bg-purple-600 text-white px-6 py-2 rounded-lg shadow hover:bg-purple-700 transition">
                    Search
                </button>
            </div>
            
            <div id="poke-result" class="mt-6 p-4 border rounded-lg bg-purple-50 hidden">
                </div>
        </div>

        <div class="bg-white shadow-md rounded-lg overflow-hidden">
            <table class="min-w-full leading-normal">
                <thead>
                    <tr>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Order ID</th>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Status</th>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Total Price</th>
                    </tr>
                </thead>
                <tbody id="order-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Automatically determine the API Base URL from the current browser address
        const API_BASE = window.location.href.split('/dashboard')[0];

        // --- FETCH ORDERS FROM DYNAMODB ---
        async function fetchOrders() {
            try {
                const res = await fetch(`${API_BASE}/orders`);
                const result = await res.json();
                
                // Note: result.data because your create_response util wraps the body in 'data'
                const orders = result.data || []; 
                const body = document.getElementById('order-body');
                
                body.innerHTML = orders.map(o => `
                    <tr>
                        <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                            <p class="text-gray-900 whitespace-no-wrap">${o.orderId}</p>
                        </td>
                        <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                            <span class="relative inline-block px-3 py-1 font-semibold leading-tight ${o.status === 'COMPLETED' ? 'text-green-900' : 'text-yellow-900'}">
                                <span aria-hidden class="absolute inset-0 ${o.status === 'COMPLETED' ? 'bg-green-200' : 'bg-yellow-200'} opacity-50 rounded-full"></span>
                                <span class="relative">${o.status}</span>
                            </span>
                        </td>
                        <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                            <p class="text-gray-900 whitespace-no-wrap">$${o.totalPrice}</p>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Failed to fetch orders:", err);
            }
        }

        // --- EXPORT CSV VIA S3 PRESIGNED URL ---
        async function exportCSV() {
            try {
                const res = await fetch(`${API_BASE}/orders/export`);
                const result = await res.json();
                if (result.data?.downloadUrl) {
                    // Opens the presigned URL in a new tab to trigger download
                    window.open(result.data.downloadUrl, '_blank');
                } else {
                    alert("Export failed: " + (result.message || "Unknown error"));
                }
            } catch (err) {
                console.error("Export error:", err);
            }
        }

        // --- 3rd PARTY INTEGRATION: POKEAPI ---
        async function searchPokemon() {
            const nameInput = document.getElementById('poke-input').value.trim();
            if (!nameInput) return;

            const display = document.getElementById('poke-result');
            display.innerHTML = '<p class="text-gray-500 italic">Searching PokeAPI...</p>';
            display.classList.remove('hidden');

            try {
                const res = await fetch(`${API_BASE}/pokemon?name=${nameInput}`);
                const result = await res.json();

                if (res.status === 200) {
                    const pokemon = result.data;
                    display.innerHTML = `
                        <div class="flex items-center gap-6">
                            <div class="bg-white p-2 rounded-full shadow-inner">
                                <img src="${pokemon.sprite}" alt="${pokemon.name}" class="w-24 h-24">
                            </div>
                            <div>
                                <h3 class="text-2xl font-bold text-purple-800 capitalize">${pokemon.name} <span class="text-gray-400 text-lg">#${pokemon.id}</span></h3>
                                <div class="flex gap-2 mt-2">
                                    ${pokemon.types.map(t => `<span class="bg-purple-200 text-purple-700 px-2 py-1 rounded text-xs uppercase font-bold">${t}</span>`).join('')}
                                </div>
                                <div class="grid grid-cols-2 gap-4 mt-3 text-sm text-gray-600">
                                    <p><strong>Height:</strong> ${pokemon.height / 10} m</p>
                                    <p><strong>Weight:</strong> ${pokemon.weight / 10} kg</p>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    display.innerHTML = `<p class="text-red-500 font-bold">Error: Pokemon not found!</p>`;
                }
            } catch (err) {
                display.innerHTML = `<p class="text-red-500 font-bold">Error: Failed to connect to API.</p>`;
            }
        }

        // Initial load
        fetchOrders();
    </script>
</body>
</html>
